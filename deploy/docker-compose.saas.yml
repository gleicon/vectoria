# Vectoria SaaS overlay — apply on top of docker-compose.prod.yml.
#
# Usage:
#   docker compose \
#     -f deploy/docker-compose.prod.yml \
#     -f deploy/docker-compose.saas.yml \
#     --env-file .env up -d --build
#
# Adds per-IP rate limiting and longer request body limit for tenant bulk imports.
# Tenant store and named indexes persist automatically inside the vectoria-data volume:
#   /data/vectoria        → main EdgeStore (products, pins, etc.)
#   /data/indexes/        → per-tenant HNSW indexes
#   /data/tenants.json    → tenant registry (keys, names, created_at)

services:
  vectoria-server:
    environment:
      VECTORIA_RATE_LIMIT_PER_SECOND: ${VECTORIA_RATE_LIMIT_PER_SECOND:-30}
